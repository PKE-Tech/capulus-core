---
# CoreDNS Custom Server Block — *.homeserver DNS-Auflösung im Cluster
#
# CoreDNS in k3s lädt automatisch alle ConfigMap-Keys mit dem Suffix .server
# aus diesem ConfigMap (Corefile: import /etc/coredns/custom/*.server).
#
# Hintergrund: dnsmasq auf dem Host (192.168.178.94:53) löst *.homeserver
# für LAN und Tailscale auf. Cluster-Pods nutzen CoreDNS (10.43.0.10) und
# kennen diese Domain nicht — Anfragen wie OIDC-Discovery an
# authentik.homeserver scheitern deshalb mit "no such host".
# Dieser Block leitet alle *.homeserver-Anfragen an dnsmasq weiter.
apiVersion: v1
kind: ConfigMap
metadata:
  name: coredns-custom
  namespace: kube-system
data:
  homeserver.server: |
    homeserver:53 {
      forward . 192.168.178.94
      cache 30
    }
