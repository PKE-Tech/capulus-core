# ACHTUNG: Platzhalter-Datei — NICHT committen/syncen, bevor die drei Werte
# unten durch echte kubeseal-Ciphertexte ersetzt sind. Die Platzhalter-Strings
# sind kein gueltiges Ciphertext-Format; der sealed-secrets-Controller würde
# beim Entschluesseln einen Fehler werfen.
#
# Secret fuer den counter-Sidecar (MinIO-Log-Upload + Zammad-Ticket).
# windeployment ist kein Helm-Chart (nur ConfigMaps/Deployments) -> die
# SealedSecret-Ciphertexte muessen hier direkt eingetragen werden, es gibt
# keine values.yaml/templates/ wie bei authentik/minio/zammad.
#
# Einmaliger Vorbereitungsaufwand, BEVOR diese Datei befuellt werden kann:
#
# 1. MinIO: einen eigenen, auf den Bucket "windows-pc-logs" beschraenkten
#    Access-Key anlegen (statt der MinIO-Root-Credentials zu verwenden):
#      mc admin user add local <ACCESS_KEY> <SECRET_KEY>
#      mc admin policy create local windeployment-logs-only policy.json
#      mc admin policy attach local windeployment-logs-only --user <ACCESS_KEY>
#    (policy.json: PutObject/GetObject nur auf arn:aws:s3:::windows-pc-logs/*)
#    Siehe argocd/apps/minio/values.yaml fuer den Bucket-Eintrag.
#
# 2. Zammad: Gruppe "Windows-PCs" anlegen (Admin-UI -> Manage -> Groups),
#    dann unter Profil -> Token Access einen API-Token mit Ticket-Rechten
#    erzeugen. Siehe docs/17-zammad.md.
#
# 3. Beide Werte versiegeln und unten eintragen:
#      seal() {
#        echo -n "$1" | kubeseal --raw --namespace windeployment \
#          --name windeployment-credentials \
#          --controller-namespace sealed-secrets \
#          --controller-name sealed-secrets-controller
#      }
#      seal "<MINIO_ACCESS_KEY>"
#      seal "<MINIO_SECRET_KEY>"
#      seal "<ZAMMAD_API_TOKEN>"
#
# Bis diese Werte echt befuellt sind, bleiben die env vars im counter-Sidecar
# leer (siehe deployment.yaml, optional: true) — Upload/Ticket-Aufrufe
# schlagen dann serverseitig stumm fehl, der PC merkt nichts davon.
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: windeployment-credentials
  namespace: windeployment
spec:
  encryptedData:
    minioAccessKey: "<HIER-MIT-kubeseal-VERSIEGELN>"
    minioSecretKey: "<HIER-MIT-kubeseal-VERSIEGELN>"
    zammadToken: "<HIER-MIT-kubeseal-VERSIEGELN>"
  template:
    metadata:
      name: windeployment-credentials
      namespace: windeployment
    type: Opaque
