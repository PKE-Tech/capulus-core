apiVersion: v1
kind: ConfigMap
metadata:
  name: pc-counter-script
  namespace: windeployment
data:
  # Kleiner HTTP-Dienst, der die fortlaufende PC-Nummer fuer das Namensschema
  # 1002011-XXXX vergibt. Persistiert den Zaehlerstand auf der PVC (ueberlebt
  # Neustarts). Wird von nginx unter /api/next-number durchgereicht (siehe
  # configmap-nginx.yaml), laeuft selbst nur auf localhost.
  counter.py: |
    import fcntl
    import http.server
    import os

    COUNTER_FILE = "/data/pc-counter.txt"

    class Handler(http.server.BaseHTTPRequestHandler):
        def do_GET(self):
            if self.path != "/next-number":
                self.send_response(404)
                self.end_headers()
                return
            next_num = self._increment()
            body = f"{next_num:04d}".encode()
            self.send_response(200)
            self.send_header("Content-Type", "text/plain")
            self.send_header("Content-Length", str(len(body)))
            self.end_headers()
            self.wfile.write(body)

        def _increment(self):
            if not os.path.exists(COUNTER_FILE):
                open(COUNTER_FILE, "w").close()
            with open(COUNTER_FILE, "r+") as f:
                fcntl.flock(f, fcntl.LOCK_EX)
                current = f.read().strip()
                next_num = (int(current) if current else 0) + 1
                f.seek(0)
                f.truncate()
                f.write(str(next_num))
                fcntl.flock(f, fcntl.LOCK_UN)
            return next_num

        def log_message(self, fmt, *args):
            print(fmt % args)

    if __name__ == "__main__":
        http.server.HTTPServer(("127.0.0.1", 8080), Handler).serve_forever()
