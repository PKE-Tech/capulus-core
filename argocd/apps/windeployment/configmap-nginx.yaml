apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-config
  namespace: windeployment
data:
  default.conf: |
    server {
      listen 80;
      server_name _;
      root /usr/share/nginx/html;
      autoindex on;
      autoindex_exact_size off;
      autoindex_localtime on;

      location /scripts/ {
        alias /usr/share/nginx/html/scripts/;
        add_header Content-Type text/plain;
      }

      location /winpe/ {
        alias /mnt/winpe/;
      }

      location /iso/ {
        alias /mnt/iso/;
      }

      location = /autounattend.xml {
        alias /usr/share/nginx/html/autounattend.xml;
        add_header Content-Type application/xml;
      }

      location = /autounattend-usb.xml {
        alias /usr/share/nginx/html/autounattend-usb.xml;
        add_header Content-Type application/xml;
      }

      location = /pc.cfg {
        alias /usr/share/nginx/html/pc.cfg;
        add_header Content-Type text/plain;
      }

      # Reicht an den counter-Sidecar im selben Pod weiter (Zaehler fuer
      # das Namensschema 1002011-XXXX, MinIO-Log-Upload, Zammad-Ticket;
      # siehe configmap-counter.yaml).
      location = /api/next-number {
        proxy_pass http://127.0.0.1:8080/next-number;
      }

      location = /api/upload-log {
        proxy_pass http://127.0.0.1:8080/upload-log;
      }

      location = /api/notify-zammad {
        proxy_pass http://127.0.0.1:8080/notify-zammad;
      }
    }
