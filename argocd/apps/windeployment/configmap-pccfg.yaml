apiVersion: v1
kind: ConfigMap
metadata:
  name: pc-cfg
  namespace: windeployment
data:
  # Einsatzzweck fuer den naechsten einzurichtenden PC (egal ob Neuinstallation
  # per PXE/USB oder bereits installiertes Windows per Ansible/setup.ps1).
  # Vor JEDEM Deployment anpassen und synchronisieren:
  #   git commit + push -> ArgoCD-Sync, oder manuell:
  #   kubectl apply -f configmap-pccfg.yaml -n windeployment
  pc.cfg: |
    Einsatzzweck=Buero
