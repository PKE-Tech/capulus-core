          <!-- USB-Version: setup.ps1 liegt auf USB-Stick (Laufwerk wechselt je nach System) -->
          <FirstLogonCommands>
            <SynchronousCommand wcm:action="add">
              <Order>1</Order>
              <RequiresUserInput>false</RequiresUserInput>
              <Description>DLRG-Software von USB-Stick installieren</Description>
              <CommandLine>powershell.exe -ExecutionPolicy Bypass -Command "foreach ($drive in 'D','E','F','G','H') { $p = \"$drive:\setup.ps1\"; if (Test-Path $p) { Start-Process powershell.exe -ArgumentList \"-ExecutionPolicy Bypass -File $p\" -Wait -Verb RunAs; break } }"</CommandLine>
            </SynchronousCommand>
          </FirstLogonCommands>
        </component>
      </settings>
    </unattend>
