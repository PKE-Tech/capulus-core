apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "wikijs.postgresql.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "wikijs.postgresql.labels" . | nindent 4 }}
spec:
  replicas: 1
  # Pflicht bei RWO-PVCs: kein zweiter Pod darf parallel auf dasselbe
  # Volume zugreifen, während der alte noch terminiert.
  strategy:
    type: Recreate
  selector:
    matchLabels:
      {{- include "wikijs.postgresql.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "wikijs.postgresql.selectorLabels" . | nindent 8 }}
    spec:
      # Offizielles postgres-Image läuft als UID/GID 999 — fsGroup macht
      # das frische PVC für initdb beschreibbar.
      securityContext:
        fsGroup: 999
      {{- with .Values.postgresql.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: postgresql
          image: "{{ .Values.postgresql.image.repository }}:{{ .Values.postgresql.image.tag }}"
          imagePullPolicy: {{ .Values.postgresql.image.pullPolicy }}
          ports:
            - name: postgresql
              containerPort: 5432
              protocol: TCP
          env:
            - name: POSTGRES_DB
              value: {{ .Values.postgresql.database | quote }}
            - name: POSTGRES_USER
              value: {{ .Values.postgresql.username | quote }}
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.name }}
                  key: db-password
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
          readinessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - {{ .Values.postgresql.username | quote }}
                - -d
                - {{ .Values.postgresql.database | quote }}
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 6
          livenessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - {{ .Values.postgresql.username | quote }}
                - -d
                - {{ .Values.postgresql.database | quote }}
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            {{- toYaml .Values.postgresql.resources | nindent 12 }}
      volumes:
        - name: data
          {{- if .Values.postgresql.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "wikijs.postgresql.fullname" . }}-data
          {{- else }}
          emptyDir: {}
          {{- end }}
