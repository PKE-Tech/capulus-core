apiVersion: v1
kind: Service
metadata:
  name: {{ include "wikijs.postgresql.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "wikijs.postgresql.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.postgresql.service.port }}
      targetPort: postgresql
      protocol: TCP
      name: postgresql
  selector:
    {{- include "wikijs.postgresql.selectorLabels" . | nindent 4 }}
