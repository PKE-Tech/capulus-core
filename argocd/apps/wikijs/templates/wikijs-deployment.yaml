apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "wikijs.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "wikijs.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.wikijs.replicaCount }}
  selector:
    matchLabels:
      {{- include "wikijs.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "wikijs.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.wikijs.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.wikijs.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.wikijs.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: wikijs
          image: "{{ .Values.wikijs.image.repository }}:{{ .Values.wikijs.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.wikijs.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.wikijs.service.targetPort }}
              protocol: TCP
          env:
            - name: DB_TYPE
              value: "postgres"
            - name: DB_HOST
              value: {{ include "wikijs.postgresql.fullname" . | quote }}
            - name: DB_PORT
              value: {{ .Values.postgresql.service.port | quote }}
            - name: DB_USER
              value: {{ .Values.postgresql.username | quote }}
            - name: DB_NAME
              value: {{ .Values.postgresql.database | quote }}
            - name: DB_PASS
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.name }}
                  key: db-password
          # Wiki.js führt DB-Migrationen beim Start durch — das kann beim
          # ersten Start (oder nach einem Versions-Upgrade) eine Weile
          # dauern, daher die großzügigen initialDelaySeconds/Schwellwerte.
          # "/" statt eines spezifischen Health-Pfads, da Wiki.js keinen
          # dedizierten Healthcheck-Endpunkt dokumentiert.
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 12
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            {{- toYaml .Values.wikijs.resources | nindent 12 }}
