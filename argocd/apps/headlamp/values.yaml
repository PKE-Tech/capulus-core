---
# Values passed through to the headlamp sub-chart.
# All keys live under `headlamp:` because that is the dependency name.
headlamp:
  replicaCount: 1

  ingress:
    enabled: true
    ingressClassName: traefik
    annotations: {}
    hosts:
      - host: headlamp.homeserver
        paths:
          - path: /
            type: Prefix
    tls: []

  # ---- OIDC — Authentik Single Sign-On -------------------------
  # Voraussetzung: SealedSecret `headlamp-oidc` im Namespace headlamp anlegen.
  # Anleitung: docs/15-cert-login.md → Schritt 8 (Headlamp)
  #
  # 1. Provider in Authentik anlegen (Redirect URI: http://headlamp.homeserver/oidc-callback)
  # 2. Client ID und Secret mit kubeseal versiegeln
  # 3. Versiegelte Werte in templates/oidc-sealedsecret.yaml eintragen
  # 4. Danach `oidc.enabled: true` setzen
  oidc:
    enabled: false
    issuerURL: "http://authentik.homeserver/application/o/headlamp/"
    scopes: "openid email profile groups"
    secretName: headlamp-oidc

  env:
    - name: HEADLAMP_CONFIG_OIDC_CLIENT_ID
      valueFrom:
        secretKeyRef:
          name: headlamp-oidc
          key: clientId
          optional: true
    - name: HEADLAMP_CONFIG_OIDC_CLIENT_SECRET
      valueFrom:
        secretKeyRef:
          name: headlamp-oidc
          key: clientSecret
          optional: true
    - name: HEADLAMP_CONFIG_OIDC_ISSUER_URL
      value: "http://authentik.homeserver/application/o/headlamp/"
    - name: HEADLAMP_CONFIG_OIDC_SCOPES
      value: "openid email profile groups"

  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi

  # The upstream chart creates a ServiceAccount named after the release.
  # We bind it to cluster-admin in templates/clusterrolebinding.yaml.
  serviceAccount:
    create: true

# ---- SealedSecret-Konfiguration (consumed by templates/oidc-sealedsecret.yaml) ---
# Nach Schritt 8 aus docs/15-cert-login.md ausfüllen.
oidcSecret:
  enabled: false
  name: headlamp-oidc
  encryptedClientId: ""
  encryptedClientSecret: ""
