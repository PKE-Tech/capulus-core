---
# Values passed through to the headlamp sub-chart.
# All keys live under `headlamp:` because that is the dependency name.
headlamp:
  replicaCount: 1

  ingress:
    enabled: true
    ingressClassName: traefik
    annotations: {}
    hosts:
      - host: headlamp.homeserver
        paths:
          - path: /
            type: Prefix
    tls: []

  # ---- OIDC — Authentik Single Sign-On -------------------------
  # Anleitung: docs/16-sso-alle-dienste.md → Schritt 2
  # SealedSecret `headlamp-oidc` enthält Keys clientID + clientSecret.
  # Diese werden per env.valueFrom auf OIDC_CLIENT_ID/OIDC_CLIENT_SECRET gemappt,
  # da der Headlamp-Chart die Env-Namen mit OIDC_-Präfix in den Args erwartet.
  config:
    oidc:
      issuerURL: "http://authentik.homeserver/application/o/headlamp/"
      scopes: "openid email profile groups"
      secret:
        create: false
        name: headlamp-oidc
    extraArgs:
      - "-oidc-client-id=$(OIDC_CLIENT_ID)"
      - "-oidc-client-secret=$(OIDC_CLIENT_SECRET)"

  env:
    - name: OIDC_CLIENT_ID
      valueFrom:
        secretKeyRef:
          name: headlamp-oidc
          key: clientID
    - name: OIDC_CLIENT_SECRET
      valueFrom:
        secretKeyRef:
          name: headlamp-oidc
          key: clientSecret

  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi

  # The upstream chart creates a ServiceAccount named after the release.
  # We bind it to cluster-admin in templates/clusterrolebinding.yaml.
  serviceAccount:
    create: true

# ---- SealedSecret-Konfiguration (consumed by templates/oidc-sealedsecret.yaml) ---
# Anleitung: docs/16-sso-alle-dienste.md → Schritt 2.3
# 1. kubeseal-Befehle aus der Anleitung ausführen
# 2. Ausgabe hier eintragen
# 3. enabled auf true setzen
# 4. Gleichzeitig oben oidc.enabled: true setzen
oidcSecret:
  enabled: true
  name: headlamp-oidc
  encryptedClientId: ""
  encryptedClientSecret: ""
