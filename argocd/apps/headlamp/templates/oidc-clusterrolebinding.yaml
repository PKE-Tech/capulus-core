---
# Bindet Authentik-OIDC-Nutzer (via email-Claim) an cluster-admin.
# k3s muss mit oidc-username-claim=email konfiguriert sein (ansible/roles/k3s).
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: headlamp-oidc-admin
  labels:
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    helm.sh/chart: {{ .Chart.Name }}-{{ .Chart.Version }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cluster-admin
subjects:
  - kind: User
    name: ichwillkeinewerbung9901@gmail.com
    apiGroup: rbac.authorization.k8s.io
