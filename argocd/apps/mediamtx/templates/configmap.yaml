apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "mediamtx.fullname" . }}-config
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "mediamtx.labels" . | nindent 4 }}
data:
  # Nur die von den Defaults abweichenden Keys sind nötig — mediamtx
  # merged diese Datei über seine eingebauten Standardwerte.
  mediamtx.yml: |
    logLevel: {{ .Values.logLevel | quote }}

    api: yes
    apiAddress: :{{ .Values.service.ports.api }}

    rtsp: yes
    rtspAddress: :{{ .Values.publishService.ports.rtsp.port }}
    rtmp: yes
    rtmpAddress: :{{ .Values.publishService.ports.rtmp.port }}
    hls: yes
    hlsAddress: :{{ .Values.service.ports.hls }}
    webrtc: yes
    webrtcAddress: :{{ .Values.service.ports.webrtc }}
    srt: no

    # Publish- und Leseautorisierung über mediamtx' eingebaute interne
    # Benutzerverwaltung (docs/24-mediamtx.md) — kein externer
    # Identity-Provider mehr nötig.
    authMethod: internal
    authInternalUsers:
      - user: {{ .Values.auth.streamer.user | quote }}
        pass: {{ .Values.auth.streamer.pass | quote }}
        ips: []
        permissions:
          - action: publish
      - user: {{ .Values.auth.viewer.user | quote }}
        pass: {{ .Values.auth.viewer.pass | quote }}
        ips: []
        permissions:
          - action: read
          - action: playback
      # Erlaubt der Kubernetes-Readiness-Probe und internem Monitoring
      # Zugriff auf API/Metrics ohne Login — beides ist ohnehin nur
      # ClusterIP-intern erreichbar, kein extern exponierter Endpunkt.
      - user: any
        pass:
        ips: []
        permissions:
          - action: api
          - action: metrics

    paths:
      all_others:
