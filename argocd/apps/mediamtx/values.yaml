---
# ============================================================
# MediaMTX — RTSP/RTMP/WebRTC/HLS Media-Server
#
# Setup-/Betriebs-Anleitung: docs/24-mediamtx.md
# ============================================================

replicaCount: 1

image:
  repository: bluenviron/mediamtx
  pullPolicy: IfNotPresent
  # Pinned für Reproduzierbarkeit. Releases:
  # https://github.com/bluenviron/mediamtx/releases
  tag: "1.19.2"

nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  name: ""

podAnnotations: {}

podSecurityContext:
  fsGroup: 1000

securityContext:
  runAsNonRoot: true
  runAsUser: 1000
  runAsGroup: 1000
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

# Interner Service — HLS-Playback + WebRTC + API/Metrics. Nur Cluster-intern
# per ClusterIP erreichbar; welche Ports zusätzlich extern (Traefik-Ingress,
# Cloudflare Tunnel) freigegeben werden, steuert ausschließlich `ingress`
# unten bzw. `argocd/apps/cloudflared/values.yaml`.
service:
  type: ClusterIP
  ports:
    hls: 8888
    webrtc: 8889
    api: 9997

# Publish-Service — RTMP/RTSP als NodePort für Encoder/OBS/ffmpeg im
# LAN/Tailnet. Bewusst NICHT über Cloudflare Tunnel erreichbar: Streaming-
# Quellen bleiben grundsätzlich intern (siehe docs/24-mediamtx.md,
# Abschnitt "Warum Publish nicht über Cloudflare läuft"). NodePorts sind
# durch die bestehenden UFW-Regeln bereits auf LAN/Tailnet beschränkt
# (siehe README.md#networking--security) — keine zusätzliche
# Firewall-Änderung nötig.
publishService:
  type: NodePort
  ports:
    rtmp:
      port: 1935
      nodePort: 31935
    rtsp:
      port: 8554
      nodePort: 31554

# Ingress für Browser-Playback — sowohl intern (stream.homeserver) als auch
# extern über den Cloudflare Tunnel (stream.pke-lab.de, siehe
# argocd/apps/cloudflared/values.yaml). Absicherung läuft komplett über
# mediamtx' eigene interne Auth (siehe `auth` unten) — der Browser bekommt
# beim Öffnen einen normalen HTTP-Basic-Auth-Dialog von mediamtx selbst,
# kein externer Identity-Provider nötig. Details: docs/24-mediamtx.md.
ingress:
  enabled: true
  className: traefik
  annotations: {}
  hosts:
    - host: stream.homeserver
      paths:
        - path: /
          pathType: Prefix
    - host: stream.pke-lab.de
      paths:
        - path: /
          pathType: Prefix
  tls: []

# mediamtx' eingebaute interne Benutzerverwaltung (`authMethod: internal`)
# deckt sowohl Publish (RTMP/RTSP) als auch Read/Playback (HLS/WebRTC) ab —
# kein externer Identity-Provider, kein JWKS-Endpunkt nötig. Nutzername und
# Passwort werden nur als SHA256-Hash hinterlegt (`sha256:<Base64-Hash>`),
# nie im Klartext, damit sie gefahrlos in Git landen können. Die Platzhalter
# unten sind absichtlich ungültige Hashes — Auth ist damit standardmäßig für
# jeden dicht, bis echte Hashes eingetragen werden (docs/24-mediamtx.md,
# Schritt 2).
auth:
  streamer:
    user: "sha256:jGl25bVBBBW96Qi9Te4V37Fnqchz/Eu4qB9vKrRIqRg="
    pass: "sha256:7o3snNoI9o1Kyb18PgLNDLhbkt74LiyeNsCD0kEp4hc="
  viewer:
    user: "sha256:01ylBRuC/8Mmo7C2V0qaMWHe4WuUeKGZ7jnNgDzlt5k="
    pass: "sha256:9yNXifrl2+t1sPvw+xyIF2riEtUwEWC5YJGLaPg3Ezg="

logLevel: info

resources:
  requests:
    cpu: 50m
    memory: 128Mi
  limits:
    cpu: 500m
    # 256Mi reichte im Leerlauf, führte unter echter Last (aktiver
    # Publish + HLS-Muxing für mehrere Zuschauer) aber zu wiederkehrendem
    # OOMKilled → Pod-Neustart → 502 beim Zuschauer. 512Mi als Puffer.
    memory: 512Mi

nodeSelector: {}

tolerations: []

affinity: {}
