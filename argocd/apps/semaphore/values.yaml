---
# ============================================================
# Semaphore UI configuration.
# Targets the bootstrap Secret `semaphore-bootstrap` that the
# Ansible role `semaphore_secrets` creates in this namespace.
# ============================================================

replicaCount: 1

image:
  repository: semaphoreui/semaphore
  pullPolicy: IfNotPresent
  # Pinned to a specific release for reproducibility — avoids surprise API
  # breakage on ArgoCD sync. To upgrade: check https://github.com/semaphoreui/semaphore/releases
  # and bump the tag here, then commit + push.
  tag: "v2.18.4"

nameOverride: ""
fullnameOverride: ""

# Timezone in which cron schedules are evaluated (Semaphore defaults to UTC).
# A "0 6 * * *" schedule then fires at 06:00 local time, DST-safe.
scheduleTimezone: "Europe/Berlin"

# Persistent volume for the embedded BoltDB and Semaphore's config.json.
persistence:
  enabled: true
  storageClassName: local-path
  size: 2Gi
  accessMode: ReadWriteOnce

service:
  type: ClusterIP
  port: 3000
  targetPort: 3000

# Reachable in your LAN via dnsmasq wildcard (add `semaphore` to
# `dnsmasq_hosts` in group_vars/all.yml) and through Tailscale MagicDNS.
ingress:
  enabled: true
  className: traefik
  annotations:
    traefik.ingress.kubernetes.io/router.middlewares: "authentik-authentik-forwardauth@kubernetescrd"
  hosts:
    - host: semaphore.homeserver
      paths:
        - path: /
          pathType: Prefix
  tls: []

# Zweiter Ingress ohne ForwardAuth — die semaphore_bootstrap-Ansible-Rolle
# spricht Semaphores eigene REST-API an (kein Authentik-Session-Cookie
# vorhanden) und braucht direkten Zugriff. semaphore-api.homeserver wird
# vom *.homeserver-Wildcard automatisch aufgelöst.
ingressApi:
  enabled: true
  host: semaphore-api.homeserver

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 1000m
    memory: 512Mi

# Name of the Secret that the Ansible role `semaphore_secrets` populates.
# Pod won't start until this Secret exists, which is fine: the role runs
# before ArgoCD reconciles this Application.
bootstrapSecretName: semaphore-bootstrap

# Directory where the bootstrap Secret is mounted (read-only) inside the
# pod. The Secret projects `ansible_vault_password` into this directory,
# and ANSIBLE_VAULT_PASSWORD_FILE points at that file so every playbook
# run can decrypt vault-encrypted vars. Mounting as a directory (no
# subPath) is required for fsGroup to apply — with subPath the file
# would be root:root and unreadable by the UID 1001 pod.
vaultPasswordMountDir: /var/run/semaphore-secrets
