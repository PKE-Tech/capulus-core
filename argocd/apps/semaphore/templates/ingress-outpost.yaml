{{- if .Values.ingress.enabled }}
# Separater Ingress für den Authentik-Outpost-Pfad auf semaphore.homeserver.
# /outpost.goauthentik.io/ muss zum Authentik-Server zeigen (nicht zu Semaphore),
# damit der ForwardAuth-Login-Flow nach dem Login korrekt zurückleiten kann.
# Kein ForwardAuth-Middleware hier — Authentik bedient diesen Pfad selbst.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "semaphore.fullname" . }}-outpost
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "semaphore.labels" . | nindent 4 }}
spec:
  ingressClassName: {{ .Values.ingress.className }}
  rules:
    {{- range .Values.ingress.hosts }}
    - host: {{ .host | quote }}
      http:
        paths:
          - path: /outpost.goauthentik.io/
            pathType: Prefix
            backend:
              service:
                name: authentik-server-alias
                port:
                  number: 80
    {{- end }}
{{- end }}
