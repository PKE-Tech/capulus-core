---
# ============================================================
# Zammad — Wrapper-Chart values
#
# Secrets-Block (SealedSecret):
#   Werte mit kubeseal versiegeln und hier eintragen.
#   Anleitung: docs/17-zammad.md → Abschnitt "Schritt 1 — Secrets versiegeln"
# ============================================================

secrets:
  enabled: true
  name: zammad-secrets
  # Versiegelte Ciphertext-Werte — NIEMALS Klartext committen!
  # Versiegeln: echo -n 'WERT' | kubeseal --raw --namespace zammad \
  #             --name zammad-secrets --controller-namespace sealed-secrets \
  #             --controller-name sealed-secrets-controller
  #
  # Beide Keys müssen dasselbe Passwort enthalten:
  #   postgresql-pass      → Key für den Zammad-App-Container
  #   postgresql-password  → Key für den Bitnami-PostgreSQL-Sub-Chart
  encryptedPostgresPass: ""
  encryptedPostgresPassword: ""
  # redis-password → Key für Zammad-App-Container + CloudPirates-Redis-Sub-Chart (gemeinsames Passwort)
  encryptedRedisPassword: ""

# ============================================================
# Sub-Chart: zammad/zammad v16.4.1
# Alle Keys unterhalb von `zammad:` landen beim upstream-Chart.
# Upstream values.yaml:
#   https://github.com/zammad/zammad-helm/blob/main/zammad/values.yaml
# ============================================================

zammad:
  # ---- Ingress -----------------------------------------------
  ingress:
    enabled: true
    className: traefik
    replicas: 1
    annotations:
      traefik.ingress.kubernetes.io/router.entrypoints: web,websecure
    hosts:
      - host: zammad.homeserver
        paths:
          - path: /
            pathType: Prefix
    tls: []

  # ---- Secrets (aus bestehendem SealedSecret) ----------------
  # Zammad liest das DB-Passwort aus `zammad-secrets[postgresql-pass]`.
  secrets:
    postgresql:
      useExisting: true
      secretKey: postgresql-pass
      secretName: zammad-secrets
    # Redis-Passwort aus existierendem SealedSecret (zammad-secrets[redis-password]).
    # Hinweis: Passwortloses Redis ist mit diesem Chart nicht nutzbar — REDIS_URL
    # wird immer als "redis://:$(REDIS_PASSWORD)@..." gebaut; ohne definierte
    # REDIS_PASSWORD-Var landet der wörtliche String "$(REDIS_PASSWORD)" im
    # Passwort-Feld und Zammad sendet ein AUTH-Kommando an ein Redis ohne Auth.
    redis:
      useExisting: true
      secretKey: redis-password
      secretName: zammad-secrets

  # ---- Zammad App + Sub-Chart Konfiguration ------------------
  zammadConfig:
    # ---- Elasticsearch deaktivieren (Ressourcenersparnis) ----
    # Zammad 7.x nutzt PostgreSQL-basierte Volltextsuche als Fallback.
    # Für Produktionseinsatz mit großem Ticketvolumen ES aktivieren.
    elasticsearch:
      enabled: false
      # initialisation ist standardmäßig true, unabhängig von enabled — ohne
      # diese Zeile versucht der zammad-init-Job trotzdem, ein (nicht
      # vorhandenes) Elasticsearch zu initialisieren, und der Job schlägt fehl.
      initialisation: false

    # ---- Memcached (aktiv — Standard-Cache) -----------------
    memcached:
      enabled: true

    # ---- PostgreSQL (intern, Bitnami Sub-Chart) -------------
    postgresql:
      enabled: true
      db: zammad_production
      user: zammad
      # pass leer lassen → kommt aus secrets.postgresql (useExisting: true)
      pass: ""

    # ---- Redis (intern, CloudPirates OCI Sub-Chart) ---------
    redis:
      enabled: true
      # pass leer lassen → kommt aus secrets.redis (useExisting: true)
      pass: ""

    # ---- Datei-Ablage (deaktiviert → Dateien in DB) ---------
    # Attachments werden in PostgreSQL gespeichert.
    # Für separates PVC: storageVolume.enabled=true +
    #   existingClaim (ReadWriteMany) — auf single-node k3s nicht Standard.
    storageVolume:
      enabled: false

    # ---- Nginx (Web-Frontend) --------------------------------
    nginx:
      resources:
        requests:
          cpu: 25m
          memory: 64Mi
        limits:
          memory: 128Mi

    # ---- Rails-App-Server -----------------------------------
    railsserver:
      resources:
        requests:
          cpu: 100m
          memory: 512Mi
        limits:
          memory: 1Gi

    # ---- Scheduler (Background Jobs) ------------------------
    scheduler:
      resources:
        requests:
          cpu: 50m
          memory: 256Mi
        limits:
          memory: 512Mi

    # ---- Websocket-Server -----------------------------------
    websocket:
      resources:
        requests:
          cpu: 50m
          memory: 256Mi
        limits:
          memory: 512Mi

    # ---- Init-Container ------------------------------------
    initContainers:
      zammad:
        resources:
          requests:
            cpu: 50m
            memory: 256Mi
          limits:
            memory: 512Mi
      postgresql:
        resources:
          requests:
            cpu: 50m
            memory: 256Mi
          limits:
            memory: 512Mi

  # ---- PostgreSQL Sub-Chart (Bitnami) -----------------------
  # Speichert Tickets + Attachments (storageVolume.enabled: false) → wächst
  # potenziell groß. Läuft daher auf der HDD-StorageClass (docs/16-hdd-storage.md)
  # statt auf der System-SSD des Homeservers.
  postgresql:
    enabled: true
    auth:
      username: zammad
      database: zammad_production
      # Passwort aus existierendem SealedSecret
      existingSecret: zammad-secrets
      secretKeys:
        userPasswordKey: postgresql-password
    primary:
      persistence:
        enabled: true
        storageClass: hdd
        size: 50Gi
      # Pflicht: hdd-PVCs binden nur auf worker-0 (siehe docs/16-hdd-storage.md)
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: kubernetes.io/hostname
                    operator: In
                    values:
                      - worker-0
      resources:
        requests:
          cpu: 50m
          memory: 256Mi
        limits:
          memory: 512Mi

  # ---- Redis Sub-Chart (CloudPirates OCI) -------------------
  # Cache/Websocket-Pub-Sub, ebenfalls auf HDD ausgelagert, damit kein
  # Persistenzspeicher auf der Homeserver-SSD landet.
  redis:
    auth:
      # Passwort aus existierendem SealedSecret (zammad-secrets[redis-password]).
      # Passwortloses Redis funktioniert mit dem zammad-Chart nicht zuverlässig,
      # siehe Kommentar bei zammad.secrets.redis weiter oben.
      enabled: true
      existingSecret: zammad-secrets
      existingSecretPasswordKey: redis-password
    persistence:
      storageClass: hdd
      size: 8Gi
    # Pflicht: hdd-PVCs binden nur auf worker-0 (siehe docs/16-hdd-storage.md)
    affinity:
      nodeAffinity:
        requiredDuringSchedulingIgnoredDuringExecution:
          nodeSelectorTerms:
            - matchExpressions:
                - key: kubernetes.io/hostname
                  operator: In
                  values:
                    - worker-0
