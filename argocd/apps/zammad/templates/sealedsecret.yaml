{{- if .Values.secrets.enabled -}}
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: {{ .Values.secrets.name }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "zammad-wrapper.labels" . | nindent 4 }}
spec:
  encryptedData:
    # Passwort für den Zammad-App-Container (secrets.postgresql.secretKey)
    postgresql-pass: {{ .Values.secrets.encryptedPostgresPass | quote }}
    # Passwort für den Bitnami-PostgreSQL-Sub-Chart (postgresql.auth.secretKeys.userPasswordKey)
    postgresql-password: {{ .Values.secrets.encryptedPostgresPassword | quote }}
  template:
    metadata:
      name: {{ .Values.secrets.name }}
      namespace: {{ .Release.Namespace }}
    type: Opaque
{{- end }}
