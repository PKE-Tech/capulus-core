---
apiVersion: v2
name: zammad
description: |
  Zammad — Open-Source Helpdesk und Ticketing-System.
  Integriert PostgreSQL, Redis und Memcached als Sub-Charts (im Zammad-Chart gebündelt).
  Elasticsearch ist deaktiviert; Zammad nutzt die eingebaute PostgreSQL-Volltextsuche.

  Web-Interface:
    http://zammad.homeserver

  Sub-Charts (im Zammad-Chart enthalten):
    - PostgreSQL 16.x (Bitnami)
    - Redis 0.30.x (CloudPirates OCI)
    - Memcached 0.13.x (CloudPirates OCI)
type: application
version: 0.1.0
appVersion: "7.1.0"
keywords:
  - zammad
  - helpdesk
  - ticketing
  - support
home: https://zammad.org
sources:
  - https://github.com/zammad/zammad-helm
maintainers:
  - name: home-server-admin
dependencies:
  - name: zammad
    repository: https://zammad.github.io/zammad-helm
    version: "16.4.1"
