---
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: {{ .Values.tunnelSecret.name }}
  namespace: {{ .Release.Namespace }}
spec:
  encryptedData:
    token: {{ .Values.tunnelSecret.encryptedToken | quote }}
  template:
    metadata:
      name: {{ .Values.tunnelSecret.name }}
      namespace: {{ .Release.Namespace }}
    type: Opaque
