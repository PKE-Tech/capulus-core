---
# cloudflared image — pin to a concrete tag and bump via Renovate.
image:
  repository: cloudflare/cloudflared
  tag: "2025.5.0"
  pullPolicy: IfNotPresent

replicaCount: 2

# Tunnel token is stored as a SealedSecret.
# Seal with:
#   echo -n '<tunnel-token>' | kubeseal --raw \
#     --namespace cloudflare-tunnel \
#     --name cloudflare-tunnel-secret \
#     --cert ~/homelab-certs/sealed-secrets.pem
tunnelSecret:
  name: cloudflare-tunnel-secret
  encryptedToken: >-
    

resources:
  requests:
    cpu: 10m
    memory: 32Mi
  limits:
    cpu: 200m
    memory: 128Mi

nodeSelector: {}
tolerations: []
affinity: {}
