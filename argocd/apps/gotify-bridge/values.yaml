---
replicaCount: 1

image:
  repository: python
  tag: "3.12-slim"
  pullPolicy: IfNotPresent

# Gotify connection — URL of the Gotify service inside the cluster.
gotify:
  url: "http://gotify.gotify.svc.cluster.local"
  # App token from Gotify UI (Apps → + App → copy token).
  # Store as a Kubernetes Secret BEFORE deploying:
  #
  #   kubectl -n gotify-bridge create secret generic gotify-bridge-token \
  #     --from-literal=token=YOUR_GOTIFY_APP_TOKEN
  #
  # To seal it instead:
  #   echo -n "YOUR_TOKEN" | kubeseal --raw \
  #     --namespace gotify-bridge --name gotify-bridge-token \
  #     --cert /tmp/sealed-secrets-cert.pem --from-file=/dev/stdin
  tokenSecretName: gotify-bridge-token
  tokenSecretKey: token

service:
  type: ClusterIP
  port: 8080

serviceAccount:
  create: true
  annotations: {}
  name: ""

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  runAsGroup: 1000
  fsGroup: 1000

securityContext:
  runAsNonRoot: true
  runAsUser: 1000
  runAsGroup: 1000
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

resources:
  requests:
    cpu: 5m
    memory: 24Mi
  limits:
    cpu: 100m
    memory: 64Mi

nodeSelector: {}
tolerations: []
affinity: {}
