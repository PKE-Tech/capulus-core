name: alamos-apager
description: >
  Zentrale Verwaltung der Raspberry-Pi-Alarmmonitor-Kiosks (ALAMOS AMweb).
  Hält pro Standort die AMweb-URL als Secret, liefert dem Pi einen
  Redirect-Endpunkt und meldet per ntfy, wenn ein Standort keinen Heartbeat
  mehr sendet. Reiner Python-stdlib-HTTP-Server, keine externen Abhängigkeiten.
