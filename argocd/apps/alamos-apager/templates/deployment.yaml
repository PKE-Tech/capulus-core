apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "alamos-apager.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "alamos-apager.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "alamos-apager.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        checksum/script: {{ include (print $.Template.BasePath "/configmap-script.yaml") . | sha256sum }}
      labels:
        {{- include "alamos-apager.selectorLabels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "alamos-apager.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: alamos-apager
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["python3", "/app/app.py"]
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            - name: NTFY_URL
              value: {{ .Values.ntfy.url | quote }}
            - name: NTFY_TOPIC
              value: {{ .Values.ntfy.topic | quote }}
            - name: HEARTBEAT_TIMEOUT_SECONDS
              value: {{ .Values.heartbeatTimeoutSeconds | quote }}
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 5
            periodSeconds: 30
          readinessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          volumeMounts:
            - name: script
              mountPath: /app
              readOnly: true
            - name: stations
              mountPath: /etc/alamos-apager/stations
              readOnly: true
            - name: data
              mountPath: /data
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: script
          configMap:
            name: {{ include "alamos-apager.fullname" . }}-script
            defaultMode: 0555
        - name: stations
          secret:
            secretName: {{ .Values.stationsSecretName }}
        - name: data
          emptyDir: {}
        - name: tmp
          emptyDir: {}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
