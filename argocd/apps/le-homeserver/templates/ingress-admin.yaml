# Admin-Dashboard. Zugriffstrennung passiert in Authentik (eigene
# Application/Provider mit Group-Binding auf .Values.authentik.adminGroup,
# siehe docs/19-le-homeserver-ui.md) sowie serverseitig in der App selbst.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "le-homeserver.fullname" . }}-admin
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "le-homeserver.labels" . | nindent 4 }}
  annotations:
    {{- toYaml .Values.ingress.annotations | nindent 4 }}
spec:
  ingressClassName: {{ .Values.ingress.className }}
  rules:
    - host: {{ .Values.ingress.adminHost | quote }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "le-homeserver.fullname" . }}
                port:
                  number: {{ .Values.service.port }}
