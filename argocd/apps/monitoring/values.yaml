---
# ============================================================
# Monitoring stack — values for victoria-metrics-k8s-stack.
# All keys live under `victoria-metrics-k8s-stack:` because that
# is the dependency name in Chart.yaml.
#
# Upstream values.yaml reference:
#   https://github.com/VictoriaMetrics/helm-charts/blob/master/charts/victoria-metrics-k8s-stack/values.yaml
# Chart docs:
#   https://docs.victoriametrics.com/helm/victoria-metrics-k8s-stack/
# ============================================================

victoria-metrics-k8s-stack:
  global:
    clusterLabel: homeserver
    cluster:
      dnsDomain: cluster.local.

  # ---- VictoriaMetrics Operator ----------------------------
  # Installs VM CRDs (VMSingle, VMAgent, VMAlert, VMServiceScrape, ...).
  # `crds.plain: true` renders CRDs as plain templates so ArgoCD can apply
  # them — required because ArgoCD ignores Helm's `crds/` folder by default.
  victoria-metrics-operator:
    enabled: true
    crds:
      plain: true
      cleanup:
        # Deleting the chart leaves CRDs on the cluster (safer default).
        enabled: false
    admissionWebhooks:
      # Avoid sync-loop races against the operator's webhook on first install.
      policy: Ignore
    operator:
      # Auto-convert Prometheus ServiceMonitor → VMServiceScrape so apps
      # that ship Prometheus-style monitors work out of the box.
      disable_prometheus_converter: false

  # ---- VictoriaMetrics single-node TSDB --------------------
  # Single-node is plenty for a home server. Switch to vmcluster only if
  # you ever push > 1M active series.
  vmsingle:
    enabled: true
    spec:
      retentionPeriod: "15d"       # h/d/w/y; unit-less = months
      replicaCount: 1
      extraArgs:
        # Drop scrapes from misbehaving targets instead of blowing memory.
        memory.allowedPercent: "60"
      storage:
        accessModes:
          - ReadWriteOnce
        storageClassName: local-path
        resources:
          requests:
            storage: 10Gi

  # ---- VMAgent ---------------------------------------------
  # Scrapes everything matching a VMServiceScrape / VMPodScrape /
  # VMNodeScrape / VMStaticScrape in any namespace. ServiceMonitors are
  # auto-converted by the operator.
  vmagent:
    enabled: true
    spec:
      selectAllByDefault: true
      scrapeInterval: 30s
      externalLabels:
        cluster: homeserver
      extraArgs:
        promscrape.streamParse: "true"

  # ---- VMAlert ---------------------------------------------
  vmalert:
    enabled: true
    spec:
      selectAllByDefault: true
      evaluationInterval: 30s

  # ---- Alertmanager ----------------------------------------
  # Routing:
  #   default → gotify-bridge (alle Alerts als kurzer Log)
  #   severity=critical → ntfy /Home-Lab (iOS Push) + gotify (continue: true)
  #
  # gotify-bridge: argocd/apps/gotify-bridge/ — übersetzt Alertmanager-JSON
  #   in Gotifys message-API. Token als Secret `gotify-bridge-token` anlegen
  #   (siehe argocd/apps/gotify-bridge/values.yaml).
  # ntfy: argocd/apps/ntfy/ — Alertmanager-Webhook wird direkt empfangen.
  alertmanager:
    enabled: true
    spec:
      replicaCount: 1
    config:
      route:
        receiver: gotify
        group_by: ["alertname", "namespace"]
        group_wait: 30s
        group_interval: 5m
        repeat_interval: 12h
        routes:
          - matchers:
              - severity="critical"
            receiver: ntfy
            continue: true
      receivers:
        - name: gotify
          webhook_configs:
            - url: 'http://gotify-bridge.gotify-bridge.svc.cluster.local:8080/alert'
              send_resolved: true
        - name: ntfy
          webhook_configs:
            - url: 'http://ntfy-bridge.ntfy-bridge.svc.cluster.local:8080/alert'
              send_resolved: true
      inhibit_rules:
        - target_matchers:
            - severity=~"warning|info"
          source_matchers:
            - severity=critical
          equal:
            - namespace
            - alertname


  # ---- Default alert rules ---------------------------------
  defaultRules:
    create: true
    # Disable rules for components k3s does not expose as separate pods:
    # controller-manager, scheduler, and etcd all run inside the single
    # k3s server process. kubeProxy is also baked in.
    groups:
      etcd:
        create: false
      kubeScheduler:
        create: false
      kubernetesSystemScheduler:
        create: false
      kubernetesSystemControllerManager:
        create: false

  # ---- Default dashboards (cluster, nodes, VM components) ---
  defaultDashboards:
    enabled: true
    defaultTimezone: browser
    dashboards:
      node-exporter-full:
        enabled: true
      victoriametrics-vmalert:
        enabled: true
      victoriametrics-operator:
        enabled: true

  # ---- Grafana --------------------------------------------
  # Exposed at http://grafana.homeserver via Traefik. Admin password is
  # auto-generated and stored in the `monitoring-grafana` Secret. Retrieve
  # with:
  #   kubectl -n monitoring get secret monitoring-grafana \
  #     -o jsonpath='{.data.admin-password}' | base64 -d; echo
  grafana:
    enabled: true
    defaultDashboardsTimezone: browser

    plugins:
      - victoriametrics-metrics-datasource

    admin:
      existingSecret: "grafana-admin"        # leave empty → auto-generated password

    # OAuth client_secret kommt aus dem SealedSecret grafana-oauth-secret
    envFromSecret: grafana-oauth-secret

    securityContext:
      runAsNonRoot: true
      runAsUser: 472
      runAsGroup: 472
      fsGroup: 472

    initChownData:
      enabled: false

    persistence:
      enabled: true
      type: pvc
      storageClassName: local-path
      accessModes:
        - ReadWriteOnce
      size: 2Gi

    resources:
      requests:
        cpu: 50m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 256Mi

    # Sidecar picks up any ConfigMap labelled `grafana_dashboard=1` —
    # `defaultDashboards` above ships its dashboards this way, and you
    # can drop extra ConfigMaps in the `monitoring` namespace to add more.
    sidecar:
      datasources:
        enabled: true
        label: grafana_datasource
        labelValue: "1"
      dashboards:
        enabled: true
        label: grafana_dashboard
        labelValue: "1"
        folder: /var/lib/grafana/dashboards
        searchNamespace: ALL
        provider:
          name: default
          orgid: 1
          foldersFromFilesStructure: true

    ingress:
      enabled: true
      ingressClassName: traefik
      annotations: {}
      labels: {}
      path: /
      pathType: Prefix
      hosts:
        - grafana.homeserver
      tls: []

    # Grafana itself is scraped by VMAgent.
    vmScrape:
      enabled: true

    grafana.ini:
      server:
        domain: grafana.homeserver
        root_url: "http://grafana.homeserver"
      auth.generic_oauth:
        enabled: true
        name: "Authentik"
        icon: "signin"
        allow_sign_up: true
        auto_login: true
        client_id: "TP7bdPbe2ozhgzmScJ73UhJVJXeGCyOSHTGcxfpB"
        client_secret: "$__env{GF_AUTH_GENERIC_OAUTH_CLIENT_SECRET}"
        scopes: "openid email profile"
        auth_url: "http://authentik.homeserver/application/o/authorize/"
        token_url: "http://authentik.homeserver/application/o/token/"
        api_url: "http://authentik.homeserver/application/o/userinfo/"
        groups_attribute_path: "groups"
        role_attribute_path: "contains(groups[*], 'authentik Admins') && 'Admin' || 'Viewer'"

  # ---- prometheus-node-exporter ----------------------------
  # DaemonSet: one pod per node (only the home-server here), exposes host
  # CPU/RAM/disk/network/load. Mounts /proc and /sys read-only.
  prometheus-node-exporter:
    enabled: true
    resources:
      requests:
        cpu: 20m
        memory: 32Mi
      limits:
        cpu: 200m
        memory: 64Mi

  # ---- kube-state-metrics ----------------------------------
  kube-state-metrics:
    enabled: true
    resources:
      requests:
        cpu: 20m
        memory: 32Mi
      limits:
        cpu: 200m
        memory: 128Mi

  # ---- Kubernetes component scraping ----------------------
  # Enabled where k3s actually exposes the metric.
  kubelet:
    enabled: true
  kubeApiServer:
    enabled: true
  coreDns:
    enabled: true

  # Disabled — k3s bakes these into a single process bound to 127.0.0.1.
  kubeControllerManager:
    enabled: false
  kubeScheduler:
    enabled: false
  kubeProxy:
    enabled: false
  # k3s ships an embedded SQLite datastore by default; no etcd to scrape.
  kubeEtcd:
    enabled: false
