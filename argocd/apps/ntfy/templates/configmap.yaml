apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "ntfy.fullname" . }}-config
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "ntfy.labels" . | nindent 4 }}
data:
  server.yml: |
    base-url: {{ index .Values.config "base-url" | quote }}
    upstream-base-url: {{ index .Values.config "upstream-base-url" | quote }}
    behind-proxy: {{ index .Values.config "behind-proxy" }}
    listen-http: ":{{ .Values.service.targetPort }}"
    cache-file: {{ index .Values.config "cache-file" | quote }}
    auth-file: {{ index .Values.config "auth-file" | quote }}
    auth-default-access: {{ index .Values.config "auth-default-access" | quote }}
