{{- if .Values.ingress.enabled }}
# ExternalName-Alias: erlaubt der Outpost-Ingress auf den Authentik-Server
# zu verweisen ohne namespace-übergreifende Service-Referenz.
apiVersion: v1
kind: Service
metadata:
  name: authentik-server-alias
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "gotify.labels" . | nindent 4 }}
spec:
  type: ExternalName
  externalName: authentik-server.authentik.svc.cluster.local
  ports:
    - name: http
      port: 80
{{- end }}
