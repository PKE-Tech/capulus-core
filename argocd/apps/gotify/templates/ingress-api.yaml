{{- if .Values.ingressApi.enabled }}
# Direkter Ingress ohne Authentik-ForwardAuth für native App-Clients (iGotify iOS).
# Gotify-eigene Token-Auth schützt den Zugriff.
# URL für iGotify: http://gotify-api.homeserver
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "gotify.fullname" . }}-api
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "gotify.labels" . | nindent 4 }}
spec:
  ingressClassName: {{ .Values.ingress.className }}
  rules:
    - host: {{ .Values.ingressApi.host | quote }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "gotify.fullname" . }}
                port:
                  number: {{ .Values.service.port }}
{{- end }}
