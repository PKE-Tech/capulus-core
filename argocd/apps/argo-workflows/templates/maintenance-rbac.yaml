---
# ClusterRole — erlaubt dem argo-workflow SA pods und workloads in allen
# Namespaces zu lesen, zu skalieren und zu überwachen. Wird ausschließlich
# vom nightly-pod-maintenance Workflow genutzt.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: argo-workflow-maintenance
rules:
  - apiGroups: [""]
    resources: [namespaces]
    verbs: [get, list]
  - apiGroups: [""]
    resources: [pods]
    verbs: [get, list, watch]
  - apiGroups: [apps]
    resources: [deployments, statefulsets, replicasets]
    verbs: [get, list, watch, patch, update]
  - apiGroups: [apps]
    resources: [deployments/scale, statefulsets/scale]
    verbs: [get, patch, update]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: argo-workflow-maintenance
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: argo-workflow-maintenance
subjects:
  - kind: ServiceAccount
    name: argo-workflow
    namespace: argo-workflows
