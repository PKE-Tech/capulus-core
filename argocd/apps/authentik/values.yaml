---
# ============================================================
# Authentik SSO — wrapper values
#
# Credentials-Block (SealedSecret):
#   Werte mit kubeseal versiegeln und hier eintragen.
#   Anleitung: docs/14-sso-authentik.md → Abschnitt "Secrets versiegeln"
# ============================================================

credentials:
  enabled: true
  secretName: authentik-credentials
  # Versiegelte Ciphertext-Werte — NIEMALS Klartext committen!
  # Versiegeln: echo -n 'WERT' | kubeseal --raw --namespace authentik \
  #             --name authentik-credentials --controller-namespace sealed-secrets \
  #             --controller-name sealed-secrets-controller
  encryptedSecretKey: ""
  encryptedDbPassword: ""
  encryptedBootstrapPassword: ""
  encryptedBootstrapEmail: ""

# ============================================================
# TLS — Server-Zertifikat für HTTPS + mTLS (Zertifikats-Login)
#
# Anleitung zum Versiegeln: docs/15-cert-login.md → Schritt 2
# Nach dem Versiegeln encryptedCrt und encryptedKey ausfüllen und
# tls.enabled auf true setzen.
# ============================================================
tls:
  enabled: false
  secretName: authentik-tls
  # Versiegelte Werte für tls.crt und tls.key — NIEMALS Klartext!
  encryptedCrt: ""
  encryptedKey: ""

# ============================================================
# Sub-Chart: goauthentik.io/authentik
# Alle Keys unterhalb von `authentik:` landen beim upstream-Chart.
# Upstream values.yaml:
#   https://github.com/goauthentik/authentik/blob/main/helm/values.yaml
# ============================================================

authentik:
  # ---- Kern-Konfiguration ---------------------------------
  authentik:
    error_reporting:
      enabled: false
    avatars: "none"
    log_level: info
    postgresql:
      host: "{{ .Release.Name }}-postgresql"
      name: authentik
      user: authentik
      # password kommt aus global.env (AUTHENTIK_POSTGRESQL__PASSWORD)

  # ---- Secrets (AUTHENTIK_BOOTSTRAP_* nur beim ersten Start) ----
  global:
    env:
      - name: AUTHENTIK_SECRET_KEY
        valueFrom:
          secretKeyRef:
            name: authentik-credentials
            key: secret_key
      - name: AUTHENTIK_POSTGRESQL__PASSWORD
        valueFrom:
          secretKeyRef:
            name: authentik-credentials
            key: db_password
      - name: AUTHENTIK_BOOTSTRAP_PASSWORD
        valueFrom:
          secretKeyRef:
            name: authentik-credentials
            key: bootstrap_password
      - name: AUTHENTIK_BOOTSTRAP_EMAIL
        valueFrom:
          secretKeyRef:
            name: authentik-credentials
            key: bootstrap_email

  # ---- Server (Web-UI + API) ------------------------------
  server:
    resources:
      requests:
        cpu: 100m
        memory: 512Mi
      limits:
        memory: 768Mi

    ingress:
      enabled: true
      ingressClassName: traefik
      annotations:
        # Mit tls.enabled=true: auf websecure + mTLS umstellen (s. Schritt 6 in docs/15-cert-login.md)
        traefik.ingress.kubernetes.io/router.entrypoints: web
        # traefik.ingress.kubernetes.io/router.entrypoints: websecure
        # traefik.ingress.kubernetes.io/router.tls: "true"
        # traefik.ingress.kubernetes.io/router.tls.options: authentik-authentik-mtls@kubernetescrd
        # traefik.ingress.kubernetes.io/router.middlewares: authentik-authentik-passtls@kubernetescrd
      hosts:
        - authentik.homeserver
        - authentik.pke-lab.de
      paths:
        - "/"
      pathType: Prefix
      # tls.enabled=true → secretName hier eintragen:
      tls: []
      # tls:
      #   - hosts:
      #       - authentik.homeserver
      #     secretName: authentik-tls

    metrics:
      serviceMonitor:
        create: false

  # ---- Worker (Background-Tasks) --------------------------
  worker:
    resources:
      requests:
        cpu: 50m
        memory: 384Mi
      limits:
        memory: 768Mi

  # ---- PostgreSQL (eingebettet) ---------------------------
  # Chart 2026.x nutzt library/postgres:17-bookworm statt des alten Bitnami-Images.
  postgresql:
    enabled: true
    auth:
      username: authentik
      database: authentik
      existingSecret: authentik-credentials
      secretKeys:
        userPasswordKey: db_password
    primary:
      persistence:
        enabled: true
        storageClass: local-path
        size: 4Gi
      resourcesPreset: "none"
      resources:
        requests:
          cpu: 50m
          memory: 256Mi
        limits:
          memory: 512Mi

  # Redis ist ab Chart 2026.x kein eigenständiger Dienst mehr.
