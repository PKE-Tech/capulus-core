---
# ============================================================
# Inventory
# ============================================================
#
# `homeservers` runs the full k3s/ArgoCD/Semaphore stack.
# Targets under `semaphore_targets` get the Semaphore SSH public key
# pushed into authorized_keys so the UI can run playbooks against them.
# `homeservers` is also a member of `semaphore_targets` so Semaphore
# can deploy this very repo against the home-server itself (recursive
# "Deploy Home Server" template).
#
# `second_servers` hosts Docker-Compose-basierte Dienste
# (Paperless-NGX, TinyTeller, Day Pilot, Node Exporter).
# ============================================================

all:
  children:
    homeservers:
      hosts:
        homeserver:
          ansible_host: 192.168.178.94
          ansible_user: ubuntu
    second_servers:
      hosts:
        worker-0:
          ansible_host: 192.168.178.95
          ansible_user: ubuntu
    k3s_agents:
      hosts:
        worker-0:
    # Hosts hier eintragen, damit `make semaphore-targets` den Semaphore-
    # SSH-Pubkey in deren authorized_keys pusht. Raspberry-Pi-Alarmmonitore
    # (Gruppe `raspberry_pis` unten) muessen hier mit aufgefuehrt werden,
    # sobald echte Hosts eingetragen sind — sonst schlaegt das Playbook mit
    # "Permission denied (publickey)" fehl (siehe docs/08-semaphore.md).
    semaphore_targets:
      hosts:
        homeserver:
        worker-0:

    # Windows-PCs der DLRG OG Andernach
    # Benutzer: Admin / Passwort aus ansible/group_vars/windows.yml (vault)
    # Voraussetzung: WinRM aktiviert (scripts/windows/winrm-enable.ps1)
    #
    # Computername (1002011-XXXX) und Einsatzzweck werden standardmaessig
    # automatisch vom windeployment-Server bezogen (Zaehler + pc.cfg, siehe
    # docs/17-windows-deployment.md). windows_pc_name/windows_pc_purpose hier
    # nur setzen, um das fuer einen Host explizit zu ueberschreiben:
    #   buero-01:
    #     ansible_host: 192.168.178.101
    #     windows_pc_purpose: Buero          # optional, sonst aus pc.cfg
    #   schulung-01:
    #     ansible_host: 192.168.178.102
    #     windows_pc_name: 1002011-0099       # optional, sonst vom Zaehler
    #     windows_pc_purpose: Schulung
    windows_pcs:
      vars:
        ansible_connection: winrm
        ansible_winrm_transport: basic
        ansible_port: 5985
        ansible_winrm_server_cert_validation: ignore
        ansible_user: Admin
      hosts: {}

    # Raspberry-Pi-Alarmmonitore (ALAMOS AMweb-Kiosk), siehe
    # docs/20-alamos-apager.md und ansible/roles/alamos_kiosk.
    #
    # alamos_kiosk_station ist PFLICHT pro Host und muss zu einem Key im
    # SealedSecret alamos-apager-stations (argocd/apps/alamos-apager)
    # passen, z.B.:
    #   geraetehaus:
    #     ansible_host: 192.168.178.110
    #     ansible_user: pi
    #     alamos_kiosk_station: geraetehaus
    #   zentrale:
    #     ansible_host: 192.168.178.111
    #     ansible_user: pi
    #     alamos_kiosk_station: zentrale
    raspberry_pis:
      hosts: {}
