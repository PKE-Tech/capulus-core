---
# ============================================================
# Configuration knobs for the home-server playbook.
# Every value with a "CHANGE" comment must be set before running.
# ============================================================

# ---- Server identity ---------------------------------------
hostname: homeserver
timezone: Europe/Berlin                # CHANGE: your timezone

# ---- Upgrade strategy --------------------------------------
# When true (default), every Ansible run keeps the OS and all installed
# components on the latest available stable version, and enables
# unattended-upgrades for background security patches between runs.
# Set to false to pin everything for reproducibility/CI.
auto_upgrade: true

# Reboot the server at the end of the `common` role if a kernel/libc update
# placed `/var/run/reboot-required` on disk.
auto_reboot_if_required: true

# ---- k3s ---------------------------------------------------
# When `k3s_version` is empty, the role follows `k3s_channel` (always latest
# release in that channel). Set to a concrete version like "v1.30.2+k3s1" to pin.
# See https://github.com/k3s-io/k3s/releases and
# https://update.k3s.io/v1-release/channels for available channels.
k3s_version: ""
k3s_channel: stable
k3s_server_ip: "{{ ansible_default_ipv4.address }}"
k3s_pod_cidr: "10.42.0.0/16"
k3s_service_cidr: "10.43.0.0/16"

# ---- k3s Agent (Worker Node) --------------------------------
# k3s_server_host: Ansible-Inventory-Name des Control-Plane-Servers.
# Wird in der k3s_agent-Rolle verwendet, um per delegate_to den Join-Token
# zu lesen und den Server-Endpoint dynamisch zu ermitteln.
k3s_server_host: homeserver
# Kubernetes-Node-Name des Worker-Nodes (muss im Cluster eindeutig sein).
k3s_agent_hostname: worker-0

# ---- Helm --------------------------------------------------
# Empty = always install the latest Helm 3 release. Pin to e.g. "v3.16.0" if needed.
helm_version: ""

# ---- ArgoCD ------------------------------------------------
# Argo Helm chart version. Empty + auto_upgrade=true ⇒ chart is upgraded to
# latest on every run. Pin to a concrete chart version (e.g. "7.3.11") for
# reproducibility — see https://artifacthub.io/packages/helm/argo/argo-cd
argocd_version: ""
argocd_namespace: argocd
argocd_server_insecure: true
# Git repo ArgoCD pulls from. Must be reachable by argocd-repo-server pod.
argocd_repo_url: "https://github.com/PKE-Tech/capulus-core.git"
# Branch/tag/SHA ArgoCD tracks. Pinned to `main` (the GitOps branch) instead of
# the ambiguous `HEAD` for reproducible bootstraps; set a tag or SHA to freeze.
argocd_repo_revision: main

# ---- Tailscale ---------------------------------------------
# Generate the auth key at https://login.tailscale.com/admin/settings/keys
# and ALWAYS store it vault-encrypted, e.g.:
#   ansible-vault encrypt_string 'tskey-auth-...' --name 'tailscale_auth_key'
# then paste the resulting `!vault |` block over the value below.
tailscale_auth_key: !vault |
          $ANSIBLE_VAULT;1.1;AES256
          33373139363365623266386163623664353137333066356261313334643465396563323163353665
          3261393966306163343035356263366330353261643138390a393134303339303737393734633737
          30363731356261643639646333326634386638363037353063313630313635623132373739303463
          3033383965656263330a326630396461366139353731643437643439376333323936366564626533
          37396635663137646537346131376434303262353164663862303134363435643265306637316438
          65623838643138656264356431623664336334303939373233366232616262663164393766653462
          346565393537316235356232323462306336
tailscale_hostname: "{{ hostname }}"

# ---- Local network ----------------------------------------
local_subnet: "192.168.178.0/24"

# ---- Semaphore UI -----------------------------------------
# Master Ansible-Vault password — same value you type when running
# `ansible-playbook --ask-vault-pass`. Semaphore uses this so playbooks
# triggered from the UI can decrypt vault-encrypted vars. To rotate:
#
#   ansible-vault encrypt_string 'YOUR_VAULT_PW' \
#     --name 'semaphore_vault_password'
#   then paste the resulting `!vault |` block over the value below.
semaphore_vault_password: !vault |
          $ANSIBLE_VAULT;1.1;AES256
          35346131356339656538326366323064356465663434383638373535646463316638333139613938
          6436346330346630386331313937626339613563333364630a343162326530393762363862353339
          38376335313130383036356266646337663164376234636438386638336366663763376330313332
          3635643637353930370a646565663731366364353566363766366130666535346635393864323937
          6433

# ---- Semaphore projects (auto-bootstrap) ------------------
# After Semaphore is reachable, the `semaphore_bootstrap` role calls the
# Semaphore REST API and idempotently creates two projects:
#
#   - home-server   (this repo, deployed against the home-server itself)
#   - homeserver2   (dieses Repo, ansible/homeserver2.yml,
#                    deployed to homeserver2 at 192.168.178.95)
#
# To add a third project, copy/extend the `semaphore_projects` list from
# ansible/roles/semaphore_bootstrap/defaults/main.yml here. The role only
# creates resources that don't already exist — to change an existing one,
# delete it in the UI and re-run `make semaphore-bootstrap`.

semaphore_projects:
  - name: home-server
    description: "Deploy / re-provision the home-server itself."
    repository:
      name: home-server-git
      url: "{{ argocd_repo_url }}"
      branch: main
    environments:
      - "{{ semaphore_default_environment }}"
    inventories:
      - name: homeservers
        type: static
        ssh_key: semaphore-ssh-key
        content: |
          [homeservers]
          homeserver ansible_host=192.168.178.94
    templates:
      - name: "Deploy Home Server"
        playbook: ansible/site.yml
        inventory: homeservers
        environment: default-env
        vault_key: vault-password
        description: "Run the full site.yml against the home-server (recursive)."
    schedules:
      - name: "Daily 06:00"
        template: "Deploy Home Server"
        cron: "0 6 * * *"
        active: true

  - name: homeserver2
    description: "Deploy Docker-Compose-Dienste auf homeserver2 (192.168.178.95)."
    repository:
      name: home-server-git
      url: "{{ argocd_repo_url }}"
      branch: main
    environments:
      - "{{ semaphore_default_environment }}"
    inventories:
      - name: second_servers
        type: static
        ssh_key: semaphore-ssh-key
        content: |
          [second_servers]
          homeserver2 ansible_host=192.168.178.95
    templates:
      - name: "Deploy homeserver2"
        playbook: ansible/homeserver2.yml
        inventory: second_servers
        environment: default-env
        vault_key: vault-password
        description: "Paperless-NGX, TinyTeller, Day Pilot, Node Exporter auf homeserver2."
    schedules:
      - name: "Daily 06:00"
        template: "Deploy homeserver2"
        cron: "0 6 * * *"
        active: true

# ---- Scanner / Paperless Ingestion ------------------------
# Fujitsu USB-Scanner direkt am Home-Server; scanbd hört auf den
# Hardware-Button und schreibt Scans als PDF in den SMB-Share von
# homeserver2, von wo Paperless-NGX sie automatisch einliest.
# Vollständige Migrations-Checkliste: docs/10-scanner.md.
#
# USB-IDs auf dem Host ermitteln (`lsusb | grep -i fujitsu`):
scanner_usb_vendor_id: "04c5"
scanner_usb_product_id: "132b"
#
# Das SMB-Passwort MUSS vault-encrypted sein. Hinweis in docs/10-scanner.md.
#   ansible-vault encrypt_string 'DEIN_SMB_PASSWORT' \
#     --name 'scanner_smb_password'
scanner_consume_mount_type: "cifs"
scanner_smb_share: "//192.168.178.95/personal_folder/paperless/consume"
scanner_smb_username: "pkretzer"
scanner_smb_password: !vault |
          $ANSIBLE_VAULT;1.1;AES256
          65623261646538323630323466633031663134333430613862666532623333613636336531366139
          3532663330613862383963333766653037366136333366610a366565313636363230323335636365
          31653863353437633462656237356332666233326465386637363235343337323733346364366235
          3233363763343830650a613038653936323431313035656165323733613939313137383563396662
          3031

# ---- Gotify push notifications ----------------------------
# Cluster-App: argocd/apps/gotify (Helm-Chart). Workflow + kubeseal-Schritte
# stehen in docs/11-gotify.md.
#
# 1) Admin-Passwort für das initiale Login (SealedSecret im Cluster):
#    ansible-vault encrypt_string 'DEIN_ADMIN_PW' --name 'gotify_admin_password'
# gotify_admin_password: !vault | ...
#
# 2) App-Token aus dem Gotify-Web-UI (Applications → Create → "Scanner"):
#    ansible-vault encrypt_string 'AppTokenXXX' --name 'scanner_gotify_token'
scanner_gotify_enabled: true
scanner_gotify_url: "http://gotify.homeserver"
scanner_gotify_token: !vault |
          $ANSIBLE_VAULT;1.1;AES256
          62323337393866356461663234313232393032613734613861366534356533393963386330323936
          3863363131353930303365316538353330336530373461620a623434383036326133666663303935
          34646334303639373339353265366635346464353532663162626537366563386534643764323732
          6638346364623337390a643262646631393332623861373737616666363931656434303366373963
          3037

# ---- homeserver2 (192.168.178.95) --------------------------
# sudo-Passwort für homeserver2 vault-verschlüsselt speichern:
#   ansible-vault encrypt_string 'DEIN_SUDO_PW' --name 'vault_homeserver2_become_password'
# vault_homeserver2_become_password: !vault | ...

# ---- Optional: configure a static IP via Netplan ----------
# Set to true to have Ansible deploy /etc/netplan/99-static.yaml.
# WARNING: the SSH session will briefly drop while the new IP is applied.
# Make sure `ansible_host` in the inventory matches `network_static_ip`
# (or update it after the first run).
network_configure_static_ip: false
network_interface: "eno1"              # CHANGE: run `ip link show` on the server
network_static_ip: "192.168.178.94"
network_prefix_length: 24              # 24 = /24 = 255.255.255.0
network_gateway: "192.168.178.1"
network_dns:
  - "1.1.1.1"
  - "8.8.8.8"
