---
# ============================================================
# Second-Server Playbook — provisioniert worker-0 (192.168.178.95).
#
# Reihenfolge:
#   1. k3s_agent  — tritt dem k3s-Cluster als Worker-Node bei
#      (benötigt laufenden k3s-Server auf homeserver/.94)
#   2. Docker-Compose-Dienste (Paperless-NGX, TinyTeller, Day Pilot,
#      Node Exporter) — laufen parallel zum Kubernetes-Workload
#
# Run with:
#   make worker-0
# Dry-run:
#   make worker-0-check
# Nur k3s-Agent:
#   make k3s-agent
# ============================================================

- name: Deploy k3s agent and services on worker-0
  hosts: second_servers
  become: true
  roles:
    - role: k3s_agent
      tags: [k3s-agent, kubernetes]
    - role: paperless
      tags: [paperless]
    - role: node_exporter_nas
      tags: [node-exporter]
    - role: tinyteller
      tags: [tinyteller]
    - role: day_pilot
      tags: [day-pilot]
