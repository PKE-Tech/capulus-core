---
# ============================================================
# Second-Server Playbook — provisioniert worker-0 (192.168.178.95).
#
# Reihenfolge:
#   1. k3s_agent  — tritt dem k3s-Cluster als Worker-Node bei
#      (benötigt laufenden k3s-Server auf homeserver/.94)
#   2. Docker-Compose-Dienste (Paperless-NGX, TinyTeller, Day Pilot,
#      Node Exporter) — laufen parallel zum Kubernetes-Workload
#   3. Uncordon — stellt sicher dass worker-0 schedulable bleibt
#      (kubectl drain/cordon durch Maintenance-Schritte rückgängig machen)
#
# Run with:
#   make worker-0
# Dry-run:
#   make worker-0-check
# Nur k3s-Agent:
#   make k3s-agent
# ============================================================

- name: Deploy k3s agent and services on worker-0
  hosts: second_servers
  become: true
  roles:
    - role: hdd_storage
      tags: [hdd, storage]
    - role: k3s_agent
      tags: [k3s-agent, kubernetes]
    - role: tinyteller
      tags: [tinyteller]
    - role: day_pilot
      tags: [day-pilot]
    - role: thermal_watchdog
      tags: [thermal-watchdog, thermal]

- name: Uncordon worker-0 nach Provisioning
  hosts: homeservers
  become: true
  tags: [uncordon, kubernetes]
  tasks:
    - name: worker-0 schedulable halten
      ansible.builtin.command:
        cmd: kubectl uncordon worker-0
      register: uncordon_result
      changed_when: "'uncordoned' in uncordon_result.stdout"
      failed_when: >
        uncordon_result.rc != 0 and
        'not found' not in uncordon_result.stderr
