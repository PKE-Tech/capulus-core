---
# ============================================================
# semaphore_bootstrap/tasks/main.yml
# Provision Projects / Keys / Repos / Inventories / Templates in
# Semaphore via its REST API. Idempotent: GET list → POST only if a
# resource with that name doesn't exist yet.
# ============================================================

- name: Pre-flight — semaphore_vault_password must not be empty
  ansible.builtin.assert:
    that: "semaphore_vault_password | length > 0"
    fail_msg: >-
      semaphore_vault_password is empty. This repo uses vault-encrypted secrets
      (tailscale_auth_key, scanner_smb_password, etc.) — Semaphore cannot decrypt
      them without a vault password. Set semaphore_vault_password in
      group_vars/all.yml (ansible-vault encrypted).

- name: Wait for the semaphore Deployment to be created
  ansible.builtin.command:
    cmd: kubectl -n {{ semaphore_namespace }} get deploy semaphore
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml
  register: _semaphore_deploy_exists
  retries: 30
  delay: 10
  until: _semaphore_deploy_exists.rc == 0
  changed_when: false

- name: Wait for the semaphore Deployment to roll out
  ansible.builtin.command:
    cmd: kubectl -n {{ semaphore_namespace }} rollout status deploy/semaphore --timeout=300s
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml
  changed_when: false

- name: Wait for the Semaphore HTTP API to respond
  ansible.builtin.uri:
    url: "{{ semaphore_api_base }}/api/ping"
    status_code: 200
    return_content: false
  register: semaphore_ping
  retries: "{{ semaphore_api_ready_retries }}"
  delay: "{{ semaphore_api_ready_delay }}"
  until: semaphore_ping.status == 200

- name: Authenticate against Semaphore
  ansible.builtin.include_tasks: login.yml

- name: Provision each Semaphore project
  ansible.builtin.include_tasks: project.yml
  loop: "{{ semaphore_projects }}"
  loop_control:
    loop_var: project_spec
    label: "{{ project_spec.name }}"

- name: List all projects for orphan cleanup
  ansible.builtin.uri:
    url: "{{ semaphore_api_base }}/api/projects"
    method: GET
    headers:
      Cookie: "{{ semaphore_cookie }}"
    return_content: true
  register: sem_all_projects

- name: Delete orphan projects not in semaphore_projects
  ansible.builtin.uri:
    url: "{{ semaphore_api_base }}/api/project/{{ item.id }}"
    method: DELETE
    headers:
      Cookie: "{{ semaphore_cookie }}"
    status_code: [204]
  loop: >-
    {{ sem_all_projects.json
       | rejectattr('name', 'in', semaphore_projects | map(attribute='name') | list)
       | list }}
  loop_control:
    label: "{{ item.name }}"

- name: Display Semaphore bootstrap summary
  ansible.builtin.debug:
    msg:
      - "=================================================="
      - "Semaphore projects provisioned"
      - "=================================================="
      - "URL:        {{ semaphore_api_base }}"
      - "Projects:   {{ semaphore_projects | map(attribute='name') | join(', ') }}"
      - "Login:      {{ semaphore_admin_username }} / (see {{ semaphore_admin_password_path }})"
      - "=================================================="
