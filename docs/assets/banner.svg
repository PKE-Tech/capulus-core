<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 420" role="img" aria-label="capulus-core — GitOps Home Lab">
  <title>capulus-core — GitOps Home Lab on k3s, ArgoCD, Tailscale</title>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"  stop-color="#060B18"/>
      <stop offset="50%" stop-color="#0D1B3E"/>
      <stop offset="100%" stop-color="#060B18"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#7C3AED"/>
      <stop offset="50%"  stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#06B6D4"/>
    </linearGradient>
    <linearGradient id="accentV" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#7C3AED"/>
      <stop offset="100%" stop-color="#06B6D4"/>
    </linearGradient>
    <radialGradient id="glow1" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%"   stop-color="#3B82F6" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#3B82F6" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%"   stop-color="#7C3AED" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#7C3AED" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow3" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%"   stop-color="#06B6D4" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#06B6D4" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" x="0" y="0" width="50" height="50" patternUnits="userSpaceOnUse">
      <path d="M 50 0 L 0 0 0 50" fill="none" stroke="#1E2A47" stroke-width="0.6" opacity="0.4"/>
    </pattern>
    <filter id="blur-sm">
      <feGaussianBlur stdDeviation="2"/>
    </filter>
    <filter id="blur-lg">
      <feGaussianBlur stdDeviation="18"/>
    </filter>
    <mask id="fade-mask">
      <linearGradient id="fade" x1="0" y1="0" x2="1" y2="0">
        <stop offset="0%" stop-color="white" stop-opacity="0"/>
        <stop offset="15%" stop-color="white" stop-opacity="1"/>
        <stop offset="85%" stop-color="white" stop-opacity="1"/>
        <stop offset="100%" stop-color="white" stop-opacity="0"/>
      </linearGradient>
      <rect width="1600" height="420" fill="url(#fade)"/>
    </mask>
  </defs>

  <!-- Background -->
  <rect width="1600" height="420" fill="url(#bg)"/>
  <rect width="1600" height="420" fill="url(#grid)"/>

  <!-- Animated glow orbs -->
  <circle cx="220" cy="210" r="300" fill="url(#glow2)" filter="url(#blur-lg)">
    <animate attributeName="opacity" values="0.6;1;0.6" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="r" values="280;320;280" dur="4s" repeatCount="indefinite"/>
  </circle>
  <circle cx="1380" cy="210" r="260" fill="url(#glow1)" filter="url(#blur-lg)">
    <animate attributeName="opacity" values="0.5;0.9;0.5" dur="5s" repeatCount="indefinite"/>
    <animate attributeName="r" values="240;290;240" dur="5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="800" cy="420" r="200" fill="url(#glow3)" filter="url(#blur-lg)">
    <animate attributeName="opacity" values="0.3;0.6;0.3" dur="6s" repeatCount="indefinite"/>
  </circle>

  <!-- Animated scan lines -->
  <rect x="0" y="0" width="1600" height="420" fill="url(#grid)" mask="url(#fade-mask)" opacity="0.5"/>

  <!-- Flowing data line across top -->
  <line x1="0" y1="3" x2="1600" y2="3" stroke="url(#accent)" stroke-width="1.5" opacity="0.4"/>
  <rect x="-200" y="0" width="200" height="6" fill="url(#accent)" opacity="0.9">
    <animate attributeName="x" values="-200;1800" dur="3s" repeatCount="indefinite"/>
  </rect>

  <!-- ──────────────── HEXAGON LOGO (left) ──────────────── -->
  <g transform="translate(210,210)">
    <!-- outer hex glow -->
    <polygon points="0,-148 128,-74 128,74 0,148 -128,74 -128,-74"
             fill="none" stroke="url(#accentV)" stroke-width="2" opacity="0.3" filter="url(#blur-sm)">
      <animate attributeName="opacity" values="0.2;0.5;0.2" dur="3s" repeatCount="indefinite"/>
    </polygon>
    <!-- outer hex ring -->
    <polygon points="0,-140 121,-70 121,70 0,140 -121,70 -121,-70"
             fill="none" stroke="url(#accent)" stroke-width="3.5">
      <animate attributeName="stroke-width" values="3;5;3" dur="3s" repeatCount="indefinite"/>
    </polygon>
    <!-- inner hex -->
    <polygon points="0,-112 97,-56 97,56 0,112 -97,56 -97,-56"
             fill="#0B1425" stroke="#1E3A5F" stroke-width="1.5"/>

    <!-- Server glyph -->
    <g stroke="url(#accent)" stroke-width="5.5" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <path d="M -55 -10 L 0 -58 L 55 -10"/>
      <path d="M -46 -10 L -46 58 L 46 58 L 46 -10"/>
      <line x1="-28" y1="12"  x2="28" y2="12"/>
      <line x1="-28" y1="30"  x2="28" y2="30"/>
      <line x1="-28" y1="48"  x2="28" y2="48"/>
    </g>
    <!-- status dots with pulse -->
    <circle cx="22" cy="12" r="4" fill="#22D3EE">
      <animate attributeName="opacity" values="1;0.3;1" dur="1.8s" repeatCount="indefinite"/>
    </circle>
    <circle cx="22" cy="30" r="4" fill="#A78BFA">
      <animate attributeName="opacity" values="1;0.3;1" dur="2.3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="22" cy="48" r="4" fill="#34D399">
      <animate attributeName="opacity" values="1;0.3;1" dur="2.8s" repeatCount="indefinite"/>
    </circle>

    <!-- corner tick marks -->
    <line x1="-148" y1="-18" x2="-148" y2="-40" stroke="#3B82F6" stroke-width="2" opacity="0.7"/>
    <line x1="-148" y1="-40" x2="-126" y2="-40" stroke="#3B82F6" stroke-width="2" opacity="0.7"/>
    <line x1="148"  y1="-18" x2="148"  y2="-40" stroke="#3B82F6" stroke-width="2" opacity="0.7"/>
    <line x1="148"  y1="-40" x2="126"  y2="-40" stroke="#3B82F6" stroke-width="2" opacity="0.7"/>
    <line x1="-148" y1="18"  x2="-148" y2="40"  stroke="#3B82F6" stroke-width="2" opacity="0.7"/>
    <line x1="-148" y1="40"  x2="-126" y2="40"  stroke="#3B82F6" stroke-width="2" opacity="0.7"/>
    <line x1="148"  y1="18"  x2="148"  y2="40"  stroke="#3B82F6" stroke-width="2" opacity="0.7"/>
    <line x1="148"  y1="40"  x2="126"  y2="40"  stroke="#3B82F6" stroke-width="2" opacity="0.7"/>
  </g>

  <!-- ──────────────── TEXT BLOCK (right) ──────────────── -->
  <g font-family="ui-monospace, 'Cascadia Code', 'Fira Code', 'SF Mono', Consolas, monospace">
    <!-- label -->
    <text x="410" y="128" font-size="16" font-weight="600" letter-spacing="8" fill="#3B82F6" opacity="0.9">GITOPS HOME LAB</text>

    <!-- main title -->
    <text font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Inter, sans-serif"
          x="406" y="240" font-size="118" font-weight="900" letter-spacing="-4" fill="#F0F6FF">
      capulus
    </text>
    <text font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Inter, sans-serif"
          x="406" y="240" font-size="118" font-weight="900" letter-spacing="-4" fill="none"
          stroke="url(#accent)" stroke-width="1" opacity="0.6">
      capulus
    </text>

    <!-- subtitle / tagline -->
    <text font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Inter, sans-serif"
          x="414" y="282" font-size="26" font-weight="400" letter-spacing="1" fill="#64748B">
      k3s · ArgoCD · Tailscale · Ansible
    </text>
  </g>

  <!-- animated accent underline under title -->
  <rect x="406" y="252" width="0" height="3" rx="2" fill="url(#accent)">
    <animate attributeName="width" values="0;760;760" dur="1.2s" fill="freeze" begin="0.3s"/>
  </rect>

  <!-- ──────────────── CHIP ROW ──────────────── -->
  <g font-family="ui-monospace, 'Cascadia Code', 'Fira Code', Consolas, monospace" font-size="18" font-weight="600">

    <!-- Ubuntu -->
    <g transform="translate(414,312)" opacity="0">
      <animate attributeName="opacity" values="0;1" dur="0.3s" fill="freeze" begin="0.2s"/>
      <rect x="0" y="0" rx="20" ry="20" width="168" height="46" fill="#0D1425" stroke="#E95420" stroke-width="1.5"/>
      <rect x="0" y="0" rx="20" ry="20" width="168" height="46" fill="#E95420" opacity="0.08"/>
      <circle cx="22" cy="23" r="5" fill="#E95420" opacity="0.9">
        <animate attributeName="opacity" values="0.9;0.3;0.9" dur="2.5s" repeatCount="indefinite"/>
      </circle>
      <text x="84" y="30" text-anchor="middle" fill="#FB8C6A">Ubuntu 26.04</text>
    </g>

    <!-- k3s -->
    <g transform="translate(594,312)" opacity="0">
      <animate attributeName="opacity" values="0;1" dur="0.3s" fill="freeze" begin="0.35s"/>
      <rect x="0" y="0" rx="20" ry="20" width="90" height="46" fill="#0D1425" stroke="#FFC61C" stroke-width="1.5"/>
      <rect x="0" y="0" rx="20" ry="20" width="90" height="46" fill="#FFC61C" opacity="0.08"/>
      <circle cx="22" cy="23" r="5" fill="#FFC61C" opacity="0.9">
        <animate attributeName="opacity" values="0.9;0.3;0.9" dur="1.9s" repeatCount="indefinite"/>
      </circle>
      <text x="45" y="30" text-anchor="middle" fill="#FDE68A">k3s</text>
    </g>

    <!-- ArgoCD -->
    <g transform="translate(696,312)" opacity="0">
      <animate attributeName="opacity" values="0;1" dur="0.3s" fill="freeze" begin="0.5s"/>
      <rect x="0" y="0" rx="20" ry="20" width="122" height="46" fill="#0D1425" stroke="#EF7B4D" stroke-width="1.5"/>
      <rect x="0" y="0" rx="20" ry="20" width="122" height="46" fill="#EF7B4D" opacity="0.08"/>
      <circle cx="22" cy="23" r="5" fill="#EF7B4D" opacity="0.9">
        <animate attributeName="opacity" values="0.9;0.3;0.9" dur="2.1s" repeatCount="indefinite"/>
      </circle>
      <text x="61" y="30" text-anchor="middle" fill="#FDBA74">ArgoCD</text>
    </g>

    <!-- Tailscale -->
    <g transform="translate(830,312)" opacity="0">
      <animate attributeName="opacity" values="0;1" dur="0.3s" fill="freeze" begin="0.65s"/>
      <rect x="0" y="0" rx="20" ry="20" width="138" height="46" fill="#0D1425" stroke="#246FDB" stroke-width="1.5"/>
      <rect x="0" y="0" rx="20" ry="20" width="138" height="46" fill="#246FDB" opacity="0.08"/>
      <circle cx="22" cy="23" r="5" fill="#246FDB" opacity="0.9">
        <animate attributeName="opacity" values="0.9;0.3;0.9" dur="2.7s" repeatCount="indefinite"/>
      </circle>
      <text x="69" y="30" text-anchor="middle" fill="#93C5FD">Tailscale</text>
    </g>

    <!-- Ansible -->
    <g transform="translate(980,312)" opacity="0">
      <animate attributeName="opacity" values="0;1" dur="0.3s" fill="freeze" begin="0.8s"/>
      <rect x="0" y="0" rx="20" ry="20" width="118" height="46" fill="#0D1425" stroke="#EE0000" stroke-width="1.5"/>
      <rect x="0" y="0" rx="20" ry="20" width="118" height="46" fill="#EE0000" opacity="0.08"/>
      <circle cx="22" cy="23" r="5" fill="#EE0000" opacity="0.9">
        <animate attributeName="opacity" values="0.9;0.3;0.9" dur="3.1s" repeatCount="indefinite"/>
      </circle>
      <text x="59" y="30" text-anchor="middle" fill="#FCA5A5">Ansible</text>
    </g>

    <!-- Grafana -->
    <g transform="translate(1110,312)" opacity="0">
      <animate attributeName="opacity" values="0;1" dur="0.3s" fill="freeze" begin="0.95s"/>
      <rect x="0" y="0" rx="20" ry="20" width="118" height="46" fill="#0D1425" stroke="#F46800" stroke-width="1.5"/>
      <rect x="0" y="0" rx="20" ry="20" width="118" height="46" fill="#F46800" opacity="0.08"/>
      <circle cx="22" cy="23" r="5" fill="#F46800" opacity="0.9">
        <animate attributeName="opacity" values="0.9;0.3;0.9" dur="2.4s" repeatCount="indefinite"/>
      </circle>
      <text x="59" y="30" text-anchor="middle" fill="#FED7AA">Grafana</text>
    </g>

    <!-- Authentik -->
    <g transform="translate(1240,312)" opacity="0">
      <animate attributeName="opacity" values="0;1" dur="0.3s" fill="freeze" begin="1.1s"/>
      <rect x="0" y="0" rx="20" ry="20" width="122" height="46" fill="#0D1425" stroke="#0EA5E9" stroke-width="1.5"/>
      <rect x="0" y="0" rx="20" ry="20" width="122" height="46" fill="#0EA5E9" opacity="0.08"/>
      <circle cx="22" cy="23" r="5" fill="#0EA5E9" opacity="0.9">
        <animate attributeName="opacity" values="0.9;0.3;0.9" dur="2.0s" repeatCount="indefinite"/>
      </circle>
      <text x="61" y="30" text-anchor="middle" fill="#BAE6FD">Authentik</text>
    </g>
  </g>

  <!-- ──────────────── BOTTOM ACCENT LINE ──────────────── -->
  <rect x="0" y="414" width="1600" height="4" fill="url(#accent)">
    <animate attributeName="opacity" values="0.6;1;0.6" dur="3s" repeatCount="indefinite"/>
  </rect>

  <!-- flowing dot on bottom line -->
  <circle cx="-8" cy="416" r="4" fill="white" opacity="0.9">
    <animate attributeName="cx" values="-8;1608" dur="3.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;1;1;0" dur="3.5s" repeatCount="indefinite"/>
  </circle>
</svg>
