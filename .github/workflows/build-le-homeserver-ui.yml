name: Build le-homeserver-ui image

on:
  push:
    branches: [main]
    paths:
      - "apps/le-homeserver-ui/**"
      - ".github/workflows/build-le-homeserver-ui.yml"
  workflow_dispatch: {}

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: apps/le-homeserver-ui
          push: true
          tags: |
            ghcr.io/pkr-lab/le-homeserver-ui:latest
            ghcr.io/pkr-lab/le-homeserver-ui:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
